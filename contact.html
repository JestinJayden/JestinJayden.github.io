<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Jahlani Arrindell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">JAHLANI</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="over.html">Over mij</a></li>
                    <li class="nav-item"><a class="nav-link" href="vaardigheden.html">Vaardigheden</a></li>
                    <li class="nav-item"><a class="nav-link" href="projecten.html">Projecten</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        <header class="page-header"><div class="container"><h1>Contact</h1></div></header>
        <section class="content">
            <div class="container">
                <div class="row">
                    <div class="col-md-8 col-lg-6">
                        <div class="contact-box">
                            <h2 class="mb-3" style="font-size:.9rem;">Stuur mij een bericht</h2>
                            <p class="mb-4">Vul je gegevens in en ik neem zo snel mogelijk contact met je op.</p>

                            <form action="https://formspree.io/f/JOUW_FORM_ID" method="POST">
                                <div class="mb-3">
                                    <label class="form-label" for="naam">Naam</label>
                                    <input type="text" class="form-control" id="naam" name="naam" placeholder="Je naam" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="email">E-mail</label>
                                    <input type="email" class="form-control" id="email" name="email" placeholder="jouw@email.nl" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="bericht">Bericht</label>
                                    <textarea class="form-control" id="bericht" name="bericht" rows="5" placeholder="Waar gaat het over?" required></textarea>
                                </div>
                                <button type="submit" class="btn btn-pac">Verstuur bericht</button>
                            </form>

                            <p class="contact-divider">Of bekijk mijn profiel:</p>
                            <a href="https://www.linkedin.com/in/JOUW-PROFIEL" target="_blank" rel="noopener" class="btn-linkedin">
                                <i class="bi bi-linkedin"></i> LinkedIn
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>(c) 2026 JAHLANI ARRINDELL</footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
